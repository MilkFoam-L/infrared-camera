<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>热成像实时画面</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <script src="/app.js"></script>

</html>
